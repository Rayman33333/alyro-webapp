<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlyroFinance</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080e14;
    --card: #111e2a;
    --card2: #162333;
    --border: #1e3347;
    --accent: #20527a;
    --accent2: #2d7ab5;
    --accent3: #4a9fd4;
    --glow: rgba(32,82,122,0.35);
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8f4ff;
    --text2: #7aa3c0;
    --text3: #3d6480;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 20px 0;
}

.topbar-logo {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 18px;
background: linear-gradient(135deg, var(–accent3), var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.topbar-avatar {
width: 36px; height: 36px;
border-radius: 50%;
background: linear-gradient(135deg, var(–accent2), var(–accent));
display: flex; align-items: center; justify-content: center;
font-family: ‘Syne’, sans-serif;
font-weight: 700; font-size: 13px; color: white;
box-shadow: 0 0 16px var(–glow);
}

.greeting { padding: 24px 20px 0; }
.greeting-sub { font-size: 13px; color: var(–text2); font-weight: 300; }
.greeting-name { font-family: ‘Syne’, sans-serif; font-size: 30px; font-weight: 800; margin-top: 4px; color: #e8f4ff; letter-spacing: -0.5px; }

.balance-card {
margin: 20px 20px 0;
background: linear-gradient(135deg, #0f2035 0%, #162d47 50%, #0d1e30 100%);
border: 1px solid #1e3d5c;
border-radius: 24px;
padding: 24px;
position: relative;
overflow: hidden;
}

.balance-card::before {
content: ‘’;
position: absolute;
top: -50px; right: -50px;
width: 160px; height: 160px;
background: radial-gradient(circle, rgba(32,82,122,0.45) 0%, transparent 70%);
border-radius: 50%;
}

.balance-label { font-size: 12px; color: var(–text3); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }

.balance-amount {
font-family: ‘Syne’, sans-serif;
font-size: 44px; font-weight: 800; color: var(–text);
margin: 6px 0 4px; letter-spacing: -2px;
position: relative; z-index: 1;
}

.balance-amount span { font-size: 24px; color: var(–text2); font-weight: 600; }
.balance-sub { font-size: 13px; color: var(–text2); margin-bottom: 20px; }
.balance-sub b { color: var(–accent3); font-weight: 500; }

.progress-wrap { position: relative; z-index: 1; }
.progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(–text3); margin-bottom: 8px; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(–accent), var(–accent3)); border-radius: 10px; transition: width 0.8s ease; position: relative; }
.progress-fill::after { content: ‘’; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; background: white; border-radius: 50%; box-shadow: 0 0 8px var(–accent3); }

.quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 20px 0; }
.stat-card { background: var(–card); border: 1px solid var(–border); border-radius: 18px; padding: 16px; }
.stat-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 10px; }
.stat-icon.blue { background: rgba(32,82,122,0.3); }
.stat-icon.yellow { background: rgba(251,191,36,0.12); }
.stat-label { font-size: 11px; color: var(–text3); text-transform: uppercase; letter-spacing: 0.8px; }
.stat-value { font-family: ‘Syne’, sans-serif; font-size: 20px; font-weight: 700; color: var(–text); margin-top: 2px; letter-spacing: -0.5px; }

.section-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 20px 12px; }
.section-title { font-family: ‘Syne’, sans-serif; font-size: 16px; font-weight: 700; }
.section-link { font-size: 12px; color: var(–accent3); font-weight: 500; cursor: pointer; }

.categories { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
.cat-item { background: var(–card); border: 1px solid var(–border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
.cat-emoji { font-size: 22px; width: 44px; height: 44px; background: var(–card2); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cat-info { flex: 1; }
.cat-name { font-size: 14px; font-weight: 500; }
.cat-bar-wrap { height: 3px; background: var(–border); border-radius: 4px; margin-top: 6px; overflow: hidden; }
.cat-bar { height: 100%; border-radius: 4px; }
.cat-amount { font-family: ‘Syne’, sans-serif; font-size: 15px; font-weight: 700; white-space: nowrap; }
.cat-pct { font-size: 11px; color: var(–text3); text-align: right; margin-top: 2px; }

.history-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
.hist-item { background: var(–card); border: 1px solid var(–border); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.hist-emoji { font-size: 18px; width: 38px; height: 38px; background: var(–card2); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hist-info { flex: 1; }
.hist-name { font-size: 13px; font-weight: 500; }
.hist-date { font-size: 11px; color: var(–text3); margin-top: 2px; }
.hist-amount { font-family: ‘Syne’, sans-serif; font-size: 14px; font-weight: 700; color: var(–red); }

.empty-state { text-align: center; padding: 30px 20px; color: var(–text3); font-size: 14px; }

.add-btn-wrap { padding: 24px 20px 32px; }
.add-btn {
width: 100%;
background: linear-gradient(135deg, var(–accent2), var(–accent));
border: none; border-radius: 18px; padding: 18px;
color: white; font-family: ‘Syne’, sans-serif;
font-size: 16px; font-weight: 700; cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 8px;
box-shadow: 0 8px 32px var(–glow);
transition: transform 0.1s;
}
.add-btn:active { transform: scale(0.98); }

.bottom-nav {
position: fixed; bottom: 0; left: 0; right: 0;
background: rgba(8,14,20,0.97);
backdrop-filter: blur(20px);
border-top: 1px solid var(–border);
display: flex; padding: 12px 0 24px;
}

.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; }
.nav-icon { font-size: 20px; opacity: 0.35; transition: opacity 0.2s; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-label { font-size: 10px; color: var(–text3); font-weight: 500; }
.nav-item.active .nav-label { color: var(–accent3); }
.nav-dot { width: 4px; height: 4px; background: var(–accent3); border-radius: 50%; margin-top: -2px; display: none; }
.nav-item.active .nav-dot { display: block; }

.scroll-pad { height: 100px; }

.loading { text-align: center; padding: 40px; color: var(–text2); }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}
.balance-card { animation: fadeUp 0.4s ease both; }
.quick-stats { animation: fadeUp 0.4s 0.1s ease both; }
.categories { animation: fadeUp 0.4s 0.2s ease both; }
.history-list { animation: fadeUp 0.4s 0.25s ease both; }
.add-btn-wrap { animation: fadeUp 0.4s 0.3s ease both; }
</style>

</head>
<body>

<div class="topbar">
  <div class="topbar-logo">AlyroFinance</div>
  <div class="topbar-avatar" id="avatar">M</div>
</div>

<div class="greeting">
  <div class="greeting-sub" id="greeting-sub">Загрузка...</div>
  <div class="greeting-name" id="greeting-name">...</div>
</div>

<div class="balance-card">
  <div class="balance-label" id="balance-label">Осталось в этом месяце</div>
  <div class="balance-amount" id="balance-amount">— <span>₽</span></div>
  <div class="balance-sub" id="balance-sub">Загрузка данных...</div>
  <div class="progress-wrap">
    <div class="progress-labels"><span>Бюджет</span><span id="progress-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="quick-stats">
  <div class="stat-card">
    <div class="stat-icon blue">☀️</div>
    <div class="stat-label">Сегодня</div>
    <div class="stat-value" id="today-amount">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon yellow">📅</div>
    <div class="stat-label">Этот месяц</div>
    <div class="stat-value" id="month-amount">—</div>
  </div>
</div>

<div class="section-header">
  <div class="section-title">Категории</div>
</div>
<div class="categories" id="categories-list">
  <div class="loading">Загрузка...</div>
</div>

<div class="section-header">
  <div class="section-title">Последние траты</div>
</div>
<div class="history-list" id="history-list">
  <div class="loading">Загрузка...</div>
</div>

<div class="add-btn-wrap">
  <button class="add-btn" onclick="Telegram.WebApp.close()">➕ Добавить трату в боте</button>
</div>

<div class="scroll-pad"></div>

<nav class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Главная</div>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">📊</div>
    <div class="nav-label">Статистика</div>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">📋</div>
    <div class="nav-label">История</div>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item">
    <div class="nav-icon">⚙️</div>
    <div class="nav-label">Настройки</div>
    <div class="nav-dot"></div>
  </div>
</nav>

<script>
const API = 'https://alyro-finance-bot-production.up.railway.app';

const CATEGORY_EMOJI = {
  'еда': '🍔', 'транспорт': '🚗', 'развлечения': '🎮',
  'одежда': '👕', 'здоровье': '💊', 'техника': '📱',
  'спорт': '⚽', 'другое': '📦'
};

const CATEGORY_COLORS = {
  'еда': '#2d7ab5', 'транспорт': '#34d399', 'развлечения': '#fbbf24',
  'одежда': '#f87171', 'здоровье': '#a78bfa', 'техника': '#4a9fd4',
  'спорт': '#34d399', 'другое': '#8888aa'
};

function fmt(n) {
  return Math.round(n).toLocaleString('ru-RU') + '₽';
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 6) return 'Доброй ночи 🌙';
  if (h < 12) return 'Доброе утро 🌤';
  if (h < 18) return 'Добрый день ☀️';
  return 'Добрый вечер 🌆';
}

async function loadData(userId) {
  try {
    const res = await fetch(`${API}/api/user?user_id=${userId}`);
    const data = await res.json();

    // Баланс
    if (data.budget > 0) {
      const pct = Math.min(Math.round(data.spent / data.budget * 100), 100);
      document.getElementById('balance-label').textContent = 'Осталось в этом месяце';
      document.getElementById('balance-amount').innerHTML = `${Math.round(data.remaining).toLocaleString('ru-RU')} <span>₽</span>`;
      document.getElementById('balance-sub').innerHTML = `Потрачено <b>${fmt(data.spent)}</b> из ${fmt(data.budget)}`;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
    } else {
      document.getElementById('balance-label').textContent = 'Потрачено в этом месяце';
      document.getElementById('balance-amount').innerHTML = `${Math.round(data.spent).toLocaleString('ru-RU')} <span>₽</span>`;
      document.getElementById('balance-sub').textContent = 'Установи бюджет в настройках бота';
      document.getElementById('progress-fill').style.width = '0%';
    }

    // Быстрая статистика
    document.getElementById('today-amount').textContent = fmt(data.today);
    document.getElementById('month-amount').textContent = fmt(data.spent);

    // Категории
    const catList = document.getElementById('categories-list');
    if (data.stats.length === 0) {
      catList.innerHTML = '<div class="empty-state">Трат пока нет 🙂</div>';
    } else {
      const total = data.stats.reduce((s, c) => s + c.amount, 0);
      catList.innerHTML = data.stats.map(cat => {
        const pct = total > 0 ? Math.round(cat.amount / total * 100) : 0;
        const emoji = CATEGORY_EMOJI[cat.category] || '📦';
        const color = CATEGORY_COLORS[cat.category] || '#2d7ab5';
        return `
          <div class="cat-item">
            <div class="cat-emoji">${emoji}</div>
            <div class="cat-info">
              <div class="cat-name">${cat.category}</div>
              <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${color}"></div></div>
            </div>
            <div>
              <div class="cat-amount">${fmt(cat.amount)}</div>
              <div class="cat-pct">${pct}%</div>
            </div>
          </div>`;
      }).join('');
    }

    // История
    const histList = document.getElementById('history-list');
    if (data.history.length === 0) {
      histList.innerHTML = '<div class="empty-state">История пуста 📋</div>';
    } else {
      histList.innerHTML = data.history.map(h => {
        const emoji = CATEGORY_EMOJI[h.category] || '📦';
        const date = h.date ? h.date.substring(0, 10) : '';
        return `
          <div class="hist-item">
            <div class="hist-emoji">${emoji}</div>
            <div class="hist-info">
              <div class="hist-name">${h.category}</div>
              <div class="hist-date">${date}</div>
            </div>
            <div class="hist-amount">−${fmt(h.amount)}</div>
          </div>`;
      }).join('');
    }

  } catch(e) {
    console.error(e);
  }
}

// Инициализация
window.Telegram.WebApp.ready();
const tg = window.Telegram.WebApp;
const user = tg.initDataUnsafe?.user;

if (user) {
  const name = user.first_name || 'Пользователь';
  document.getElementById('greeting-name').textContent = name;
  document.getElementById('avatar').textContent = name[0].toUpperCase();
  document.getElementById('greeting-sub').textContent = getGreeting();
  loadData(user.id);
} else {
  // Для теста в браузере
  document.getElementById('greeting-name').textContent = 'Матвей';
  document.getElementById('greeting-sub').textContent = getGreeting();
  loadData(5087419521);
}
</script>

</body>
</html>
